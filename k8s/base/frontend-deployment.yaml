apiVersion: apps/v1
kind: Deployment
metadata:
 name: mikrocsirip-frontend
 labels:
 app: mikrocsirip-frontend
spec:
 replicas: 2
 selector:
 matchLabels:
 app: mikrocsirip-frontend
 template:
 metadata:
 labels:
 app: mikrocsirip-frontend
 spec:
 containers:
 - name: frontend
 image: REGISTRY/mikrocsirip-frontend:latest
 imagePullPolicy: Always
 ports:
 - containerPort: 80
 resources:
 requests:
 memory: "64Mi"
 cpu: "50m"
 limits:
 memory: "128Mi"
 cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
 name: mikrocsirip-frontend-svc
spec:
 selector:
 app: mikrocsirip-frontend
 ports:
 - protocol: TCP
 port: 80
 targetPort: 80
 type: ClusterIP
