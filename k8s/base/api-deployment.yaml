apiVersion: apps/v1
kind: Deployment
metadata:
 name: mikrocsirip-api
 labels:
 app: mikrocsirip-api
spec:
 replicas: 2
 selector:
 matchLabels:
 app: mikrocsirip-api
 template:
 metadata:
 labels:
 app: mikrocsirip-api
 spec:
 containers:
 - name: api
 image: REGISTRY/mikrocsirip-api:latest
 imagePullPolicy: Always
 ports:
 - containerPort: 8080
 env:
 - name: ASPNETCORE_ENVIRONMENT
 value: "Production"
 - name: ConnectionStrings__DefaultConnection
 valueFrom:
 secretKeyRef:
 name: mikrocsirip-secrets
 key: db-connection-string
 - name: Jwt__Key
 valueFrom:
 secretKeyRef:
 name: mikrocsirip-secrets
 key: jwt-key
 - name: Jwt__Issuer
 value: "MikroCsirip"
 - name: Jwt__Audience
 value: "MikroCsiripUsers"
 - name: AllowedOrigin
 valueFrom:
 configMapKeyRef:
 name: mikrocsirip-config
 key: frontend-url
 resources:
 requests:
 memory: "128Mi"
 cpu: "100m"
 limits:
 memory: "256Mi"
 cpu: "500m"
 livenessProbe:
 httpGet:
 path: /health
 port: 8080
 initialDelaySeconds: 30
 periodSeconds: 10
 readinessProbe:
 httpGet:
 path: /health
 port: 8080
 initialDelaySeconds: 10
 periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
 name: mikrocsirip-api-svc
spec:
 selector:
 app: mikrocsirip-api
 ports:
 - protocol: TCP
 port: 80
 targetPort: 8080
 type: ClusterIP
