version: '3.9'

services:
 api:
 build:
 context: ./backend/MikroCsirip
 dockerfile: Dockerfile
 ports:
 - "8080:8080"
 environment:
 - ASPNETCORE_ENVIRONMENT=Development
 - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=mikrocsirip;User Id=sa;Password=DevPassword123!;TrustServerCertificate=True;
 - Jwt__Key=DevSecretKeyAtLeast32CharsLongHere!!
 - Jwt__Issuer=MikroCsirip
 - Jwt__Audience=MikroCsiripUsers
 - AllowedOrigin=http://localhost:4200
 depends_on:
 sqlserver:
 condition: service_healthy

 frontend:
 build:
 context: ./frontend
 dockerfile: Dockerfile
 ports:
 - "4200:80"
 depends_on:
 - api

 sqlserver:
 image: mcr.microsoft.com/mssql/server:2022-latest
 environment:
 - ACCEPT_EULA=Y
 - SA_PASSWORD=DevPassword123!
 - MSSQL_COLLATION=Hungarian_CI_AS
 ports:
 - "1433:1433"
 volumes:
 - sqldata:/var/opt/mssql
 healthcheck:
 test: ["CMD", "/opt/mssql-tools/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "DevPassword123!", "-Q", "SELECT 1"]
 interval: 10s
 timeout: 5s
 retries: 10

volumes:
 sqldata:
