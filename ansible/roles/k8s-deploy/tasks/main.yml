- name: API Deployment manifest generalasa
  template:
    src: api-deployment.yaml.j2
    dest: /tmp/mikrocsirip-api-deployment.yaml

- name: Frontend Deployment manifest generalasa
  template:
    src: frontend-deployment.yaml.j2
    dest: /tmp/mikrocsirip-frontend-deployment.yaml

- name: API Deployment alkalmazasa
  shell: microk8s kubectl apply --validate=false -f /tmp/mikrocsirip-api-deployment.yaml --namespace {{ k8s_namespace }}
  changed_when: true

- name: Frontend Deployment alkalmazasa
  shell: microk8s kubectl apply --validate=false -f /tmp/mikrocsirip-frontend-deployment.yaml --namespace {{ k8s_namespace }}
  changed_when: true

- name: Ingress alkalmazasa
  shell: microk8s kubectl apply --validate=false -n {{ k8s_namespace }} -f {{ project_root }}/k8s/base/ingress.yaml
  changed_when: true

- name: Varakozas az API rollout-ra
  shell: microk8s kubectl rollout status deployment/mikrocsirip-api --namespace {{ k8s_namespace }} --timeout=300s
  register: api_rollout
  changed_when: false
  failed_when: false

- name: API pod allapot
  shell: microk8s kubectl get pods -n {{ k8s_namespace }} -l app=mikrocsirip-api -o wide
  register: api_pods
  changed_when: false

- name: API pod allapot kiirasa
  debug:
    msg: "{{ api_pods.stdout_lines }}"

- name: API pod events
  shell: |
    POD=$(microk8s kubectl get pods -n {{ k8s_namespace }} -l app=mikrocsirip-api \
      -o jsonpath='{.items[0].metadata.name}' 2>/dev/null)
    if [ -n "$POD" ]; then
      microk8s kubectl describe pod $POD -n {{ k8s_namespace }} | tail -20
    fi
  register: api_events
  changed_when: false
  failed_when: false

- name: API pod events kiirasa
  debug:
    msg: "{{ api_events.stdout_lines }}"
  when: api_rollout.rc != 0

- name: API pod logok
  shell: |
    POD=$(microk8s kubectl get pods -n {{ k8s_namespace }} -l app=mikrocsirip-api \
      -o jsonpath='{.items[0].metadata.name}' 2>/dev/null)
    if [ -n "$POD" ]; then
      microk8s kubectl logs $POD -n {{ k8s_namespace }} --tail=30 2>/dev/null || \
        echo "Meg nem erhetok el a logok"
    fi
  register: api_logs
  changed_when: false
  failed_when: false

- name: API logok kiirasa
  debug:
    msg: "{{ api_logs.stdout_lines }}"
  when: api_rollout.rc != 0

- name: API rollout ellenorzese
  fail:
    msg: "Az API pod nem indult el!"
  when: api_rollout.rc != 0

- name: Varakozas a Frontend rollout-ra
  shell: microk8s kubectl rollout status deployment/mikrocsirip-frontend --namespace {{ k8s_namespace }} --timeout=300s
  changed_when: false

- name: Podok allapota
  shell: microk8s kubectl get pods -n {{ k8s_namespace }}
  register: pods_status
  changed_when: false

- name: Podok listaja
  debug:
    msg: "{{ pods_status.stdout_lines }}"
