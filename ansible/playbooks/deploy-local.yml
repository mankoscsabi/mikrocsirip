---
- name: MikroCsirip - Lokalis Kubernetes Deploy
  hosts: localhost
  connection: local
  gather_facts: false

  vars_files:
    - ../group_vars/all.yml
    - ../group_vars/local.yml

  pre_tasks:
    - name: Docker ellenorzese
      command: docker info
      changed_when: false

    - name: MicroK8s inditasa ha nem fut
      shell: |
        if ! microk8s status 2>/dev/null | grep -q "microk8s is running"; then
          microk8s start
        fi
      changed_when: false

    - name: Varakozas a MicroK8s indulasara
      shell: microk8s status --wait-ready --timeout 120
      changed_when: false

    - name: kubectl konfig frissitese
      shell: |
        mkdir -p ~/.kube
        microk8s config > ~/.kube/config
      changed_when: false

    - name: Node IP lekerdezese
      shell: |
        microk8s kubectl get nodes -o jsonpath='{.items[0].status.addresses[?(@.type=="InternalIP")].address}' 2>/dev/null || echo "localhost"
      register: node_ip_auto
      changed_when: false

    - name: Effektiv ingress IP beallitasa
      set_fact:
        effective_ip: "{{ ingress_ip if ingress_ip is defined and ingress_ip != '' else node_ip_auto.stdout }}"

    - name: Frontend environment.prod.ts beallitasa
      copy:
        dest: "{{ project_root }}/frontend/src/environments/environment.prod.ts"
        content: |
          export const environment = {
            production: true,
            apiUrl: 'http://{{ effective_ip }}/api'
          };

    - name: Frontend Dockerfile javitasa npm install
      replace:
        path: "{{ project_root }}/frontend/Dockerfile"
        regexp: 'npm ci --silent'
        replace: 'npm install --silent'

    - name: Frontend Dockerfile javitasa browser mappa
      replace:
        path: "{{ project_root }}/frontend/Dockerfile"
        regexp: 'dist/mikrocsirip-frontend/browser'
        replace: 'dist/mikrocsirip-frontend'

  roles:
    - role: local-registry
      tags: [registry]
    - role: k8s-namespace
      tags: [namespace]
    - role: local-sql
      tags: [sql]
    - role: k8s-deploy
      tags: [deploy]

  post_tasks:
    - name: Deploy osszefoglalo
      debug:
        msg:
          - "MikroCsirip sikeresen deploy-olva!"
          - "Frontend : http://{{ effective_ip }}"
          - "API      : http://{{ effective_ip }}/api"

- name: MikroCsirip - Ingress beallitasa
  hosts: localhost
  connection: local
  gather_facts: false

  vars_files:
    - ../group_vars/all.yml
    - ../group_vars/local.yml

  tasks:
    - name: MicroK8s ingress addon bekapcsolasa
      shell: microk8s enable ingress
      changed_when: false
      ignore_errors: true

    - name: Varakozas az ingress controlerre
      pause:
        seconds: 10

    - name: Node IP lekerdezese
      shell: |
        microk8s kubectl get nodes -o jsonpath='{.items[0].status.addresses[?(@.type=="InternalIP")].address}' 2>/dev/null || echo "localhost"
      register: node_ip_auto
      changed_when: false

    - name: Effektiv ingress IP beallitasa
      set_fact:
        effective_ip: "{{ ingress_ip if ingress_ip is defined and ingress_ip != '' else node_ip_auto.stdout }}"

    - name: Vegeredmeny
      debug:
        msg:
          - "========================================"
          - "  MikroCsirip elindult!"
          - "========================================"
          - "  Frontend : http://{{ effective_ip }}"
          - "  API      : http://{{ effective_ip }}/api"
          - "  Swagger  : http://{{ effective_ip }}/swagger"
          - "  Kezeles  : ./mikrocsirip.sh"
          - "========================================"
PLAYEOF
echo "Kész"
